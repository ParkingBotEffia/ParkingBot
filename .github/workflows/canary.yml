name: canary-systemtest

# Weekly end-to-end self-check, fully separate from the Bellegarde watcher
# (watch.yml). Runs the SAME detection code against Marseille (which reliably has
# subscription availability) and emails a clearly-labelled "test système OK" — never
# a false spot alert. Writes nothing; shares only the read-only email secrets.
#
# Triggered weekly (Sunday 18:00 UTC) by an EXTERNAL cron-job.org job hitting the
# workflow_dispatch API — NOT GitHub's native `schedule:` cron, which proved
# unreliable (it fired this canary ~4.5h late). Same reliable trigger as watch.yml.
on:
  workflow_dispatch:        # fired by cron-job.org weekly + usable for on-demand runs

permissions:
  contents: read

concurrency:
  group: canary-systemtest
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Weekly system-test (Marseille canary)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          FREE_SMS_USER: ${{ secrets.FREE_SMS_USER }}
          FREE_SMS_PASS: ${{ secrets.FREE_SMS_PASS }}
          PYTHONPATH: src
        run: python -m parkingbot.main --canary
