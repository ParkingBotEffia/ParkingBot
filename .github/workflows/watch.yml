name: watch-effia-valserhone

# Runs the watcher on a schedule (every ~5 min) and on manual trigger.
# GitHub's cron has a 5-min minimum and may be delayed a few minutes under load;
# that is fine for this use case.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a plain test email instead of checking availability"
        type: boolean
        default: false
      self_test:
        description: "Run the full alert path on a captured 'available' page and email it"
        type: boolean
        default: false
      health_test:
        description: "Send a test of the 'bot is broken' breakage-alarm email"
        type: boolean
        default: false

# Allow the job to push the updated state.json back to the repo.
permissions:
  contents: write

# Never let two runs overlap (a slow run + the next schedule tick).
concurrency:
  group: watch-effia
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test email (manual only)
        if: ${{ inputs.test_email }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          PYTHONPATH: src
        run: python -m parkingbot.main --test-email

      - name: Self-test full alert path (manual only)
        if: ${{ inputs.self_test }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          PYTHONPATH: src
        run: python -m parkingbot.main --self-test

      - name: Health-alarm test (manual only)
        if: ${{ inputs.health_test }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          PYTHONPATH: src
        run: python -m parkingbot.main --health-test

      - name: Check availability
        if: ${{ !inputs.test_email && !inputs.self_test && !inputs.health_test }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          PYTHONPATH: src
        run: python -m parkingbot.main --once

      - name: Persist state + daily heartbeat
        if: ${{ !inputs.test_email && !inputs.self_test && !inputs.health_test }}
        run: |
          # The heartbeat is today's UTC date. It changes at most once per day, so
          # it produces one keep-alive commit daily — enough to stop GitHub from
          # auto-disabling the schedule after 60 days of no repository activity.
          date -u +%Y-%m-%d > heartbeat.txt
          if [[ -n "$(git status --porcelain state.json heartbeat.txt)" ]]; then
            git config user.name "ParkingBotEffia"
            git config user.email "294556926+ParkingBotEffia@users.noreply.github.com"
            git add state.json heartbeat.txt
            git commit -m "Update state / heartbeat [skip ci]"
            git push
          else
            echo "No change; nothing to commit."
          fi
